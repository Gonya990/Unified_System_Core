version: "3.8"

services:

  # Mobile Relay Listener for iOS App
  mobile-relay-listener:
    build:
      context: ./Projects/AI_Core
      dockerfile: Dockerfile
    image: ghcr.io/gonya990/unified_system_core/mobile-relay-listener:latest
    container_name: mobile-relay-listener
    restart: always
    command: ["python", "-m", "src.mobile_relay_listener"]
    env_file: .env
    environment:
      - GOOGLE_APPLICATION_CREDENTIALS=/app/unified-core-service-account.json
      - GCP_PROJECT_ID=unified-core-agent-db
    volumes:
      - bot-data:/app/data
      - ./Projects/AI_Core/config:/app/config
      - ./Projects/AI_Core/conversations:/app/conversations
      - ./Projects/AI_Core/unified-core-service-account.json:/app/unified-core-service-account.json:ro
      - ./Secrets:/app/unified_secrets:ro
      - ./Scripts:/app/Scripts:ro
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - unified-net
  # Mail Intelligence Service
  mail-intelligence:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.services
    image: ghcr.io/unified-system-core/unified-system-core/mail-intelligence:latest
    restart: always
    command: ["python", "Scripts/Orchestration/mail_processor.py"]
    env_file: .env
    networks:
      - unified-net

  # Content Factory Scheduler
  content-factory:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.services
    image: ghcr.io/unified-system-core/unified-system-core/content-factory:latest
    restart: always
    command:
      [
        "python",
        "Projects/Content_Factory/src/pipeline/factory_scheduler.py",
        "--scheduler",
      ]
    environment:
      - OUTPUT_DIR_OVERRIDE=/app/Projects/Content_Factory/outputs
    env_file: .env
    volumes:
      - factory-outputs:/app/Projects/Content_Factory/outputs
      - /home/gonya/.config/unified-system:/root/.config/unified-system:ro
    networks:
      - unified-net

  # ChatKit Dashboard
  dashboard:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.dashboard
    image: ghcr.io/unified-system-core/unified-system-core/dashboard:latest
    restart: always
    ports:
      - "3005:3000"
    env_file: .env
    networks:
      - unified-net

  # MarkItDown MCP Server
  markitdown-mcp:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.markitdown
    image: ghcr.io/unified-system-core/unified-system-core/markitdown-mcp:latest
    restart: always
    ports:
      - "8000:8000"
    env_file: .env
    networks:
      - unified-net

  # Gmail Intelligence Agent - DISPATCHER & MONITOR
  gmail-agent:
    build:
      context: .
      dockerfile: infra/docker/Dockerfile.services
    image: ghcr.io/unified-system-core/unified-system-core/gmail-agent:latest
    restart: always
    command: ["python", "Scripts/Orchestration/gmail_agent.py"]
    env_file: .env
    environment:
      - DB_PATH=/data/user_context.db
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-key.json
      - GCP_PROJECT_ID=my-home-435112
      - PROJECT_ID=my-home-435112
    volumes:
      - bot-data:/data
      - ./Projects/AI_Core/gcp-service-account.json:/app/gcp-key.json:ro
    depends_on:
      - markitdown-mcp
    networks:
      - unified-net

networks:
  unified-net:
    driver: bridge

volumes:
  bot-data:
  factory-outputs:
