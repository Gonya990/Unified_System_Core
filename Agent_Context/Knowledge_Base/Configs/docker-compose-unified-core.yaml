version: "3.8"

services:
  # 🧠 OpenCode (Ollama) - Local AI Brain
  ollama:
    image: ollama/ollama:latest
    container_name: unified-core-ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_storage:/root/.ollama
    restart: always
    networks:
      - unified-net
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  # 💻 Open WebUI - Chat Interface (ChatGPT clone)
  open-webui:
    image: ghcr.io/open-webui/open-webui:main
    container_name: unified-core-webui
    ports:
      - "3000:8080"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    volumes:
      - webui_storage:/app/backend/data
    restart: always
    depends_on:
      - ollama
    networks:
      - unified-net

  # 🛡 Watchtower - Auto Updater
  watchtower:
    image: containrrr/watchtower
    container_name: unified-core-updater
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 3600 --cleanup
    restart: always
    networks:
      - unified-net

  # 🤖 AI Telegram Bot - Main Interface
  ai-bot:
    image: ai-telegram-bot:v2
    container_name: unified-core-bot
    restart: always
    environment:
      - TELEGRAM_BOT_TOKEN=8518131338:AAGp4GpyNR0S-Dq3bwzD0rPkZN0sEcBLaB0
      - ADMIN_ID=708531393
      - ALLOWED_USERS=708531393,5569219290
      - INFERENCE_PROVIDER=ollama
      - OLLAMA_BASE_URL=http://ollama:11434
      - OLLAMA_MODEL=llama3.2
      - GEMINI_API_KEY=AIzaSyBVtb9sY7MMiKWkpcQAEkvLST86yr9O1n4
      - GEMINI_MODEL=gemini-2.0-flash-exp
      - OPENAI_API_KEY=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
      - OPENAI_MODEL=gpt-4o
      - SQLITE_DB_PATH=/app/data/user_context.db
      - PYTHONUNBUFFERED=1
    volumes:
      - bot_data:/app/data
    depends_on:
      - ollama
    networks:
      - unified-net

volumes:
  ollama_storage:
  webui_storage:
  bot_data:

networks:
  unified-net:
    driver: bridge
