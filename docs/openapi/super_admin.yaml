        "401": { $ref: "#/components/responses/Unauthorized" }
        "500": { $ref: "#/components/responses/InternalError" }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Access token issued by VASER Hub.
    apiKeyAuth:
      type: apiKey
      in: header
      name: X-VASER-API-Key
      description: API key for trusted service accounts.
    oauth2Cloud:
      type: oauth2
      description: OAuth2 tokens for cloud providers (Google, Apple, Microsoft, Yandex, Dropbox).
      flows:
        authorizationCode:
          authorizationUrl: https://auth.vaser-hub.example.com/oauth/authorize
          tokenUrl: https://auth.vaser-hub.example.com/oauth/token
          scopes:
            calendar: Access calendar data
            mail: Access mail data
            drive: Access drive files
            icloud: Access iCloud data
            disk: Access Yandex Disk data
            dropbox: Access Dropbox data
  responses:
    BadRequest:
      description: Invalid input or malformed request.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Unauthorized:
      description: Authentication required or failed.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Not allowed by policy or missing permissions.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource not found.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Resource conflict (already exists or state mismatch).
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    InternalError:
      description: Internal server error.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
  schemas:
    NetworkScanRequest:
      type: object
      properties:
        cidr:
          type: string
          description: CIDR range to scan.
          example: 192.168.1.0/24
        methods:
          type: array
          items:
            type: string
            enum: [arp, ping, mdns, snmp]
          description: Scan methods to use.
        include_offline:
          type: boolean
          description: Whether to include offline devices in the result.
          default: false
      required: [cidr]
    NetworkScanResponse:
      type: object
      properties:
        scan_id:
          type: string
        devices:
          type: array
          items:
            $ref: "#/components/schemas/DeviceSummary"
        started_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
      required: [scan_id, devices]
    DeviceSummary:
      type: object
      properties:
        device_id:
          type: string
        hostname:
          type: string
        ip:
          type: string
          format: ipv4
        mac:
          type: string
        status:
          type: string
          enum: [online, offline, unknown]
        vendor:
          type: string
      required: [device_id, ip, status]
    DeviceInfoRequest:
      type: object
      properties:
        device_id:
          type: string
        ip:
          type: string
          format: ipv4
      oneOf:
        - required: [device_id]
        - required: [ip]
    DeviceInfoResponse:
      type: object
      properties:
        device:
          $ref: "#/components/schemas/DeviceDetails"
      required: [device]
    DeviceDetails:
      type: object
