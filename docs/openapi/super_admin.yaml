openapi: 3.1.0
info:
  title: VASER Control Hub - Super Admin Actions
  version: 1.0.0
  description: |
    Unified OpenAPI manifest for the Super-Admin GPT actions.

    Role: "You are the main AI network administrator for the VASER platform."

    This API centralizes network administration, Home Assistant operations,
    local gateway execution, cloud integrations, management tasks, and analytics.
    It follows the Vasya Gateway style: clear request/response schemas, explicit
    security requirements, and a consistent error model.
servers:
  - url: https://vaser-hub.local
    description: Primary VASER Control Hub (internal)
  - url: https://api.vaser-hub.example.com
    description: Public gateway (through secure tunnel)
security:
  - bearerAuth: []
  - apiKeyAuth: []
  - oauth2Cloud: []
tags:
  - name: Network
    description: LAN discovery and device lifecycle actions.
  - name: Home Assistant
    description: Home Assistant entity/service operations.
  - name: Local Gateway
    description: Local Python gateway for safe command and file operations.
  - name: Clouds
    description: Cloud productivity and storage services.
  - name: Management
    description: Tasking, reminders, reports.
  - name: Analytics
    description: Logs collection, analysis, summaries, and presentations.
paths:
  /network/scan:
    post:
      tags: [Network]
      summary: scan_network
      description: Scan the local network and return discovered devices.
      operationId: scan_network
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/NetworkScanRequest"
      responses:
        "200":
          description: Scan results with device list.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/NetworkScanResponse"
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }
  /network/device/info:
    post:
      tags: [Network]
      summary: get_device_info
      description: Retrieve detailed information about a device by ID or IP.
      operationId: get_device_info
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeviceInfoRequest"
      responses:
        "200":
          description: Device details.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceInfoResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
  /network/device/command:
    post:
      tags: [Network]
      summary: run_command
      description: Run a command on a target device via SSH/WinRM/API.
      operationId: run_command
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunCommandRequest"
      responses:
        "200":
          description: Command execution result.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunCommandResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "500": { $ref: "#/components/responses/InternalError" }
  /network/device:
    post:
      tags: [Network]
      summary: add_device
      description: Register a new device in VASER Hub.
      operationId: add_device
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AddDeviceRequest"
      responses:
        "200":
          description: Device registered.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceOperationResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "409": { $ref: "#/components/responses/Conflict" }
        "500": { $ref: "#/components/responses/InternalError" }
    delete:
      tags: [Network]
      summary: remove_device
      description: Remove a device from VASER Hub.
      operationId: remove_device
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RemoveDeviceRequest"
      responses:
        "200":
          description: Device removed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceOperationResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "401": { $ref: "#/components/responses/Unauthorized" }
        "404": { $ref: "#/components/responses/NotFound" }
        "500": { $ref: "#/components/responses/InternalError" }
  /network/device/reboot:
    post:
      tags: [Network]
      summary: reboot_device
      description: Reboot a managed device (may require user confirmation).
      operationId: reboot_device
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RebootDeviceRequest"
      responses:
        "200":
          description: Reboot initiated.
          content:
            application/json:
