name: Preview Environment

on:
    pull_request:
        types: [opened, synchronize, reopened, closed]

env:
    PROJECT_ID: my-home-435112
    GAR_LOCATION: us-central1
    SERVICE_NAME: { { SERVICE_NAME } }
    REPOSITORY: ai-core-repo
    IMAGE: { { SERVICE_NAME } }
    CLUSTER_NAME: autopilot-cluster-1
    CLUSTER_LOCATION: us-central1

jobs:
    deploy-preview:
        if: github.event.action != 'closed'
        name: Deploy Preview
        runs-on: ubuntu-latest
        permissions:
            contents: "read"
            id-token: "write"
            pull-requests: "write"

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            # Workload Identity
            - id: "auth"
              uses: "google-github-actions/auth@v2"
              with:
                  workload_identity_provider: "projects/40369165386/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
                  service_account: "telegram-bot-firestore@my-home-435112.iam.gserviceaccount.com"

            - name: Set up Cloud SDK
              uses: "google-github-actions/setup-gcloud@v2"

            - name: Docker Auth
              run: |-
                  gcloud auth configure-docker "${{ env.GAR_LOCATION }}-docker.pkg.dev"

            - name: Build and Push Container
              run: |-
                  docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:pr-${{ github.event.number }}" .
                  docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:pr-${{ github.event.number }}"

            - name: Get GKE Credentials
              uses: google-github-actions/get-gke-credentials@v2
              with:
                  cluster_name: ${{ env.CLUSTER_NAME }}
                  location: ${{ env.CLUSTER_LOCATION }}

            - name: Deploy to Preview Namespace
              run: |-
                  NAMESPACE="pr-${{ github.event.number }}"
                  kubectl create namespace $NAMESPACE || true

                  # Label namespace for auto-cleanup/cost-monitoring if needed
                  kubectl label namespace $NAMESPACE env=preview --overwrite

                  # Prepare Manifest
                  # Using sed to replace placeholders. In a real scenario, use kustomize or helm.
                  sed -i "s/{{IMAGE_FULL_PATH}}/${{ env.GAR_LOCATION }}-docker.pkg.dev\/${{ env.PROJECT_ID }}\/${{ env.REPOSITORY }}\/${{ env.IMAGE }}:pr-${{ github.event.number }}/g" k8s/deployment.yaml
                  sed -i "s/{{SERVICE_NAME}}/${{ env.SERVICE_NAME }}/g" k8s/deployment.yaml

                  # Deploy
                  kubectl apply -f k8s/deployment.yaml -n $NAMESPACE

            - name: Comment on PR
              uses: actions/github-script@v6
              with:
                  script: |
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: '🚀 Preview Environment Deployed!\n\nNamespace: `pr-${{ github.event.number }}`\nImage: `pr-${{ github.event.number }}`'
                      })

    cleanup-preview:
        if: github.event.action == 'closed'
        name: Cleanup Preview
        runs-on: ubuntu-latest
        permissions:
            id-token: "write"
            contents: "read"
            pull-requests: "write"

        steps:
            - id: "auth"
              uses: "google-github-actions/auth@v2"
              with:
                  workload_identity_provider: "projects/40369165386/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
                  service_account: "telegram-bot-firestore@my-home-435112.iam.gserviceaccount.com"

            - name: Get GKE Credentials
              uses: google-github-actions/get-gke-credentials@v2
              with:
                  cluster_name: ${{ env.CLUSTER_NAME }}
                  location: ${{ env.CLUSTER_LOCATION }}

            - name: Delete Namespace
              run: |-
                  NAMESPACE="pr-${{ github.event.number }}"
                  kubectl delete namespace $NAMESPACE --ignore-not-found=true

            - name: Comment on PR
              uses: actions/github-script@v6
              with:
                  script: |
                      github.rest.issues.createComment({
                        issue_number: context.issue.number,
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        body: '🗑 Preview Environment `pr-${{ github.event.number }}` has been deleted.'
                      })
