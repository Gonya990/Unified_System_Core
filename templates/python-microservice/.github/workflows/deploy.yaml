name: Build and Deploy

on:
  push:
    branches: ["main"]

env:
  PROJECT_ID: my-home-435112
  GAR_LOCATION: us-central1
  SERVICE_NAME: "{ { SERVICE_NAME } }"
  REPOSITORY: ai-core-repo
  IMAGE: "{ { SERVICE_NAME } }"

jobs:
  build-push-deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Workload Identity Federation
      - id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: "projects/40369165386/locations/global/workloadIdentityPools/github-pool/providers/github-provider"
          service_account: "telegram-bot-firestore@my-home-435112.iam.gserviceaccount.com" # TODO: Use specific SA

      - name: Set up Cloud SDK
        uses: "google-github-actions/setup-gcloud@v2"
        with:
          version: ">= 416.0.0"

      - name: Docker Auth
        run: |-
          gcloud auth configure-docker "${{ env.GAR_LOCATION }}-docker.pkg.dev"

      # Build and Push
      - name: Build and Push Container
        run: |-
          docker build -t "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}" .
          docker push "${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}"

      # Deploy to GKE
      - name: Get GKE Credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: autopilot-cluster-1
          location: us-central1

      - name: Deploy to GKE
        run: |-
          # Replace placeholders in k8s manifest
          sed -i "s/{{IMAGE_FULL_PATH}}/${{ env.GAR_LOCATION }}-docker.pkg.dev\/${{ env.PROJECT_ID }}\/${{ env.REPOSITORY }}\/${{ env.IMAGE }}:${{ github.sha }}/g" k8s/deployment.yaml
          sed -i "s/{{SERVICE_NAME}}/${{ env.SERVICE_NAME }}/g" k8s/deployment.yaml

          kubectl apply -f k8s/deployment.yaml
          kubectl rollout status deployment/${{ env.SERVICE_NAME }}
