version: "3.8"

services:
  telegram-bot:
    build: .
    image: ghcr.io/gonya990/ai-telegram-bot:${VERSION:-latest}
    container_name: ai-telegram-bot
    restart: unless-stopped
    volumes:
      - bot-data:/data
    environment:
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - INFERENCE_BASE_URL=${INFERENCE_BASE_URL:-http://host.docker.internal:11434}
      - INFERENCE_API_KEY=${INFERENCE_API_KEY:-}
      - MODEL_NAME=${MODEL_NAME:-llama3.2}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    ports:
      - "8080:8080"
    networks:
      - bot-network

volumes:
  bot-data:

networks:
  bot-network:
    driver: bridge
