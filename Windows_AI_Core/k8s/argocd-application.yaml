apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: ai-telegram-bot
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Gonya990/Unified_System_Core.git
    targetRevision: main
    path: Windows_AI_Core/k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: telegram-bot
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
      allowEmpty: false
    syncOptions:
      - CreateNamespace=true
      - PrunePropagationPolicy=foreground
    retry:
      limit: 5
      backoff:
        duration: 5s
        factor: 2
        maxDuration: 3m
