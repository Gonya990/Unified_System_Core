apiVersion: apps.nvidia.com/v1alpha1
kind: NIMService
metadata:
  name: llama-nemoguard-8b
  namespace: nim-service
spec:
  image:
    repository: nvcr.io/nim/nvidia/llama-3.1-nemoguard-8b-topic-control
    tag: "1.10.1"
    pullPolicy: IfNotPresent
    pullSecrets:
      - ngc-secret
  authSecret: ngc-api-secret
  storage:
    pvc:
      create: true
      size: "120Gi"           # подберите под модель и диск
      volumeAccessMode: "ReadWriteOnce"
  replicas: 1
  resources:
    limits:
      nvidia.com/gpu: 1
  expose:
    service:
      type: ClusterIP
      port: 8000