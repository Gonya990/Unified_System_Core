apiVersion: v1
kind: Namespace
metadata:
  name: factory
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: factory-pvc
  namespace: factory
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: content-factory-orchestrator
  namespace: factory
spec:
  replicas: 0 # Usually run as Job or CronJob
  selector:
    matchLabels:
      app: content-factory
  template:
    metadata:
      labels:
        app: content-factory
    spec:
      containers:
        - name: orchestrator
          image: us-central1-docker.pkg.dev/my-home-435112/unified-core-images/content-factory@sha256:45fb7a50f29684b160bba4112b49f42940c4b29bd927445edd0dcfd667c45b52
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          envFrom:
            - secretRef:
                name: factory-secrets
          volumeMounts:
            - name: outputs-storage
              mountPath: /app/outputs
      volumes:
        - name: outputs-storage
          persistentVolumeClaim:
            claimName: factory-pvc
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: daily-content-production
  namespace: factory
spec:
  schedule: "0 9 * * *" # Every day at 9 AM
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: factory
              image: us-central1-docker.pkg.dev/my-home-435112/unified-core-images/content-factory@sha256:45fb7a50f29684b160bba4112b49f42940c4b29bd927445edd0dcfd667c45b52
              command: ["python", "src/researcher/daily_researcher.py"]
              resources:
                requests:
                  cpu: "1"
                  memory: "2Gi"
                limits:
                  cpu: "2"
                  memory: "4Gi"
              envFrom:
                - secretRef:
                    name: factory-secrets
          restartPolicy: OnFailure
