apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: trading-default-deny
  namespace: trading
spec:
  podSelector: {} # Select all pods in namespace
  policyTypes:
  - Ingress
  - Egress
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-public-egress
  namespace: trading
spec:
  podSelector: {}
  policyTypes:
  - Egress
  # Allow all egress for now (External APIs like Telegram, ByBit, OpenAI)
  egress:
  - {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-internal-ingress
  namespace: trading
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  ingress:
  # Allow traffic from within the same namespace
  - from:
    - podSelector: {}
  # Allow monitoring/ingress controllers (adjust labels as needed)
  - from:
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: kube-system
    - namespaceSelector:
        matchLabels:
          kubernetes.io/metadata.name: gke-gmp-system
