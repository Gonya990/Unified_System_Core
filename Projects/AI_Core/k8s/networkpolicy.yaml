apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: ai-telegram-bot-netpol
  namespace: trading
spec:
  podSelector:
    matchLabels:
      app: telegram-bot
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: ingress-nginx  # Allow from ingress controller
    ports:
    - protocol: TCP
      port: 8080  # API port
  egress:
  - to:
    - ipBlock:
        cidr: 0.0.0.0/0  # Allow all external traffic (Telegram, GCP, etc.)
    ports:
    - protocol: TCP
      port: 443  # HTTPS
    - protocol: TCP
      port: 80   # HTTP
  - to:
    - namespaceSelector: {}  # Allow internal k8s traffic
