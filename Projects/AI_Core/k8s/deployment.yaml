apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-telegram-bot
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegram-bot
  template:
    metadata:
      labels:
        app: telegram-bot
    spec:
      containers:
        - name: bot
          image: ghcr.io/unified-system-core/unified_system_core/ai-telegram-bot:latest
          imagePullPolicy: Always
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /app/config/gcp-service-account.json
          envFrom:
            - secretRef:
                name: telegram-bot-secrets
            - configMapRef:
                name: telegram-bot-config
          volumeMounts:
            - name: google-creds
              mountPath: /app/config/gcp-service-account.json
              subPath: gcp-service-account.json
            - name: config-host
              mountPath: /app/config
            - name: conversations-host
              mountPath: /app/conversations
            - name: db-storage
              mountPath: /data
      volumes:
        - name: google-creds
          configMap:
            name: bot-google-credentials
        - name: config-host
          hostPath:
            path: /home/gonya/Unified_System_Core/Projects/AI_Core/config
            type: DirectoryOrCreate
        - name: conversations-host
          hostPath:
            path: /home/gonya/Unified_System_Core/Projects/AI_Core/conversations
            type: DirectoryOrCreate
        - name: db-storage
          hostPath:
            path: /home/gonya/bot_data
            type: DirectoryOrCreate
