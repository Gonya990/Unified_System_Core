apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-telegram-bot
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegram-bot
  template:
    metadata:
      labels:
        app: telegram-bot
    spec:
      containers:
      - name: bot
        image: ai-telegram-bot:local
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            cpu: "200m"
            memory: "512Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        env:
        - name: GOOGLE_APPLICATION_CREDENTIALS
          value: /app/gcp-service-account.json
        - name: GOOGLE_CLIENT_SECRETS
          value: /app/config/gmail_credentials.json
        envFrom:
        - secretRef:
            name: ai-core-secrets
        volumeMounts:
        - name: google-creds
          mountPath: /app/config/credentials.json
          subPath: credentials.json
          readOnly: true
        - name: google-creds
          mountPath: /app/gcp-service-account.json
          subPath: gcp-service-account.json
        - name: gmail-creds
          mountPath: /app/config/gmail_credentials.json
          subPath: gmail_credentials.json
        - name: config-host
          mountPath: /app/config
        - name: conversations-host
          mountPath: /app/conversations
        - name: db-storage
          mountPath: /app/data
        - name: claude-agents
          mountPath: /app/.claude/agents
      volumes:
      - name: google-creds
        configMap:
          name: bot-google-credentials
      - name: gmail-creds
        configMap:
          name: bot-gmail-credentials
      - name: config-host
        hostPath:
          path: /home/gonya/Unified_System_Core/Projects/AI_Core/config
          type: DirectoryOrCreate
      - name: conversations-host
        hostPath:
          path: /home/gonya/Unified_System_Core/Projects/AI_Core/conversations
          type: DirectoryOrCreate
      - name: db-storage
        hostPath:
          path: /home/gonya/bot_data
          type: DirectoryOrCreate
      - name: claude-agents
        hostPath:
          path: /home/gonya/Unified_System_Core/.claude/agents
          type: DirectoryOrCreate
