apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-telegram-bot
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegram-bot
  template:
    metadata:
      labels:
        app: telegram-bot
    spec:
      containers:
        - name: bot
          image: us-central1-docker.pkg.dev/my-home-435112/unified-core-images/ai-telegram-bot:v2-ssh-proxy
          imagePullPolicy: Always
          resources:
            requests:
              cpu: "200m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          env:
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: bybit-secrets
                  key: TELEGRAM_BOT_TOKEN
            - name: BOT_INSTANCE
              value: "production"
            - name: GOOGLE_CLIENT_SECRETS
              value: "/app/config/credentials.json"
            - name: DB_PATH
              value: "/app/data/user_context.db"
            - name: DISABLE_FIRESTORE
              value: "true"
            - name: ALLOWED_USERS
              value: "708531393,5569219290,578363419"
            - name: ADMIN_ID
              value: "708531393"
            - name: FACTORY_REMOTE_HOST
              value: "unified-home-core-cloud"
            - name: FACTORY_REMOTE_USER
              value: "gonya"
            - name: FACTORY_REMOTE_ROOT
              value: "/home/gonya/Unified_System_Core"
            - name: CRYPTO_BOT_LOG_PATH
              value: "/home/gonya/.pm2/logs/crypto-bot-error.log"
          volumeMounts:
            - name: db-storage
              mountPath: /app/data
            - name: google-creds
              mountPath: /app/config
              readOnly: true
      volumes:
        - name: db-storage
          hostPath:
            path: /home/gonya/bot_data
            type: DirectoryOrCreate
        - name: google-creds
          configMap:
            name: bot-google-credentials
