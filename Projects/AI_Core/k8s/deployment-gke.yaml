apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-telegram-bot
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: telegram-bot
  template:
    metadata:
      labels:
        app: telegram-bot
    spec:
      serviceAccountName: ai-telegram-bot-sa
      containers:
        - name: bot
          image: us-central1-docker.pkg.dev/my-home-435112/unified-core-images/ai-telegram-bot@sha256:b728eed2bba7f01063f4f16261f314ef31083ac1e95e1ca2663fef6fffdc5247
          imagePullPolicy: Always
          command: ["python", "-m", "src.ai_telegram_bot_v2"]
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1000m"
              memory: "2Gi"
          env:
            - name: GOOGLE_APPLICATION_CREDENTIALS
              value: /app/gcp-service-account.json
            - name: GOOGLE_CLIENT_SECRETS
              value: /app/config/gmail_credentials.json
            - name: PROJECT_ID
              value: "my-home-435112"
            - name: BOT_INSTANCE
              value: "igor"
            - name: FACTORY_REMOTE_HOST
              value: "unified-home-core-cloud"
            - name: FACTORY_REMOTE_USER
              value: "gonya"
            - name: FACTORY_REMOTE_ROOT
              value: "/home/gonya/Unified_System_Core"
            - name: OAUTHLIB_INSECURE_TRANSPORT
              value: "1"
            - name: CRYPTO_BOT_LOG_PATH
              value: "/home/gonya/.pm2/logs/crypto-bot-error.log"
            - name: GITHUB_TOKEN
              valueFrom:
                secretKeyRef:
                  name: ai-core-secrets
                  key: GITHUB_TOKEN
                  optional: true
          envFrom:
            - secretRef:
                name: ai-core-secrets
          volumeMounts:
            - name: google-creds
              mountPath: /app/config/credentials.json
              subPath: credentials.json
              readOnly: true
            - name: google-creds
              mountPath: /app/gcp-service-account.json
              subPath: gcp-service-account.json
            - name: gmail-creds
              mountPath: /app/config/gmail_credentials.json
              subPath: gmail_credentials.json
            - name: vibranium-vault
              mountPath: /root/.config/unified-system/tokens.yaml
              subPath: tokens.yaml
      volumes:
        - name: google-creds
          configMap:
            name: bot-google-credentials
        - name: gmail-creds
          configMap:
            name: bot-gmail-credentials
        - name: vibranium-vault
          secret:
            secretName: vibranium-tokens
