services:
  ai-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-telegram-bot:v2
    container_name: ai_telegram_bot
    restart: always
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Logs
      - ./bot.log:/app/bot.log
      # Persistence (DB, Conversations)
      - ./user_context.db:/app/user_context.db
      - ./conversations:/app/conversations
      # Credentials (if not in env)
      - ./client_secret.json:/app/client_secret.json
    environment:
      - PYTHONUNBUFFERED=1
    # Ensure logs are accessible via docker logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
