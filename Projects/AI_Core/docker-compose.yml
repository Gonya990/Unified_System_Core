services:
  ai-bot:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-telegram-bot:v2
    container_name: ai_telegram_bot
    restart: always
    env_file:
      - .env
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # Logs
      - ./bot.log:/app/bot.log
      # Persistence (DB, Conversations)
      - ./user_context.db:/app/user_context.db
      - ./conversations:/app/conversations
      # Credentials (if not in env)
      - ./client_secret.json:/app/client_secret.json
      # GCP Service Account for Firestore (optional)
      - ./gcp-service-account.json:/app/gcp-service-account.json:ro
    environment:
      - PYTHONUNBUFFERED=1
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcp-service-account.json
      - GCP_PROJECT_ID=my-home-435112
    # Ensure logs are accessible via docker logs
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
