# Common configuration shared between pre-built and local-build services
x-firestore-listener-common: &listener-common
  restart: always
  env_file:
    - .env
  extra_hosts:
    - "host.docker.internal:host-gateway"
  volumes:
    - ./firestore_listener.log:/app/firestore_listener.log
    - ./user_context.db:/app/user_context.db
    - ./conversations:/app/conversations
    - ./config:/app/config
    - ./data:/app/data
    - ../../config/users.yaml:/app/config/users.yaml
    - ../../config/resources.yaml:/app/config/resources.yaml
    - ./config/gmail_credentials.json:/app/config/gmail_credentials.json
    - ./secrets:/app/secrets
    - ../../secrets:/app/unified_secrets:ro
    - ./unified-core-service-account.json:/app/unified-core-service-account.json:ro
    - ../../Scripts:/app/Scripts:ro
  environment:
    - PYTHONUNBUFFERED=1
    - GOOGLE_APPLICATION_CREDENTIALS=/app/unified-core-service-account.json
    - GCP_PROJECT_ID=unified-core-agent-db
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:
  # Pre-built image (default)
  firestore-listener:
    <<: *listener-common
    image: ghcr.io/gonya990/unified_system_core/firestore-listener:latest
    labels:
      - "com.centurylinklabs.watchtower.enable=true"

  # Local build (optional)
  firestore-listener-local:
    <<: *listener-common
    profiles: ["local"]
    build:
      context: .
      dockerfile: Dockerfile
    image: firestore-listener:local

  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    restart: always
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_POLL_INTERVAL=300
      - DOCKER_CONFIG=/run/secrets
    secrets:
      - source: watchtower-config
        target: config.json
    command: --interval 300

secrets:
  watchtower-config:
    file: ./watchtower-config.json
