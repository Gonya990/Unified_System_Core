<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Required - Unified Bot</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #0f172a;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            max-width: 400px;
        }

        h1 {
            margin-bottom: 20px;
        }

        p {
            color: #94a3b8;
            line-height: 1.6;
        }

        .bot-link {
            display: inline-block;
            margin-top: 20px;
            padding: 12px 24px;
            background: #3b82f6;
            color: white;
            text-decoration: none;
            border-radius: 10px;
            font-weight: bold;
            transition: transform 0.2s;
        }

        .bot-link:hover {
            transform: scale(1.05);
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h1>🔐 Access Required</h1>
        <p>This dashboard is exclusive to the Unified System Federation members.</p>
        <p>Please open the bot in Telegram and use the <b>/login</b> command to generate your secure access link.</p>
        <a href="https://t.me/GonyaHomeBot" class="bot-link">Open @GonyaHomeBot</a>
    </div>
</body>

</html>
