apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-bridge
  labels:
    app: agent-bridge
spec:
  replicas: 1
  selector:
    matchLabels:
      app: agent-bridge
  template:
    metadata:
      labels:
        app: agent-bridge
    spec:
      containers:
      - name: agent-bridge
        image: gcr.io/quantum-conduit-496517-p3/agent-bridge:latest
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        env:
        - name: GOOGLE_CLOUD_PROJECT
          value: "unified-core-agent-db"
        - name: GEMINI_API_KEY
          valueFrom:
            secretKeyRef:
              name: gemini-secrets
              key: api-key
