apiVersion: apps/v1
kind: Deployment
metadata:
  name: bybit-ai-alpha-agent
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bybit-bot
      component: alpha-agent
  template:
    metadata:
      labels:
        app: bybit-bot
        component: alpha-agent
    spec:
      containers:
        - name: alpha-agent
          image: gonya/bybit-alpha:latest
          resources:
            limits:
              cpu: "1000m"
              memory: "2Gi"
            requests:
              cpu: "500m"
              memory: "1Gi"
          env:
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: bybit-bot-config
                  key: redis_url
