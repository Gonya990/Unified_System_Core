apiVersion: v1
kind: ConfigMap
metadata:
  name: bybit-bot-config
  namespace: trading
data:
  target_symbol: "BTC/USDT"
  target_apr: "0.15"
  max_leverage: "3"
  max_pos_size: "2000"
  daily_loss_limit: "500"
  redis_url: "redis://redis-cluster.trading:6379"
  database_url: "postgresql://trading_user:trading_pass@timescaledb.trading:5432/trading"
  log_level: "INFO"
