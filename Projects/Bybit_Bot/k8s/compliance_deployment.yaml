apiVersion: apps/v1
kind: Deployment
metadata:
  name: bybit-compliance
  namespace: trading
spec:
  replicas: 1
  selector:
    matchLabels:
      app: bybit-compliance
  template:
    metadata:
      labels:
        app: bybit-compliance
    spec:
      containers:
        - name: compliance
          image: gonya/bybit-compliance:latest
          env:
            - name: REDIS_URL
              valueFrom:
                configMapKeyRef:
                  name: bybit-bot-config
                  key: redis_url
            - name: DATABASE_URL
              valueFrom:
                configMapKeyRef:
                  name: bybit-bot-config
                  key: database_url
          resources:
            limits:
              cpu: "200m"
              memory: "512Mi"
