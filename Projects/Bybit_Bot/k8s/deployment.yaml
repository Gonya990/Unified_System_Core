apiVersion: apps/v1
kind: Deployment
metadata:
  name: bybit-execution-engine
  labels:
    app: bybit-bot
    service: execution
spec:
  replicas: 2
  selector:
    matchLabels:
      service: execution
  template:
    metadata:
      labels:
        service: execution
    spec:
      containers:
        - name: execution
          image: ghcr.io/unified-system-core/bybit-execution:latest
          env:
            - name: BYBIT_API_KEY
              valueFrom:
                secretKeyRef:
                  name: bybit-secrets
                  key: api-key
            - name: BYBIT_API_SECRET
              valueFrom:
                secretKeyRef:
                  name: bybit-secrets
                  key: api-secret
          envFrom:
            - configMapRef:
                name: bot-config
          resources:
            requests:
              memory: "128Mi"
              cpu: "250m"
            limits:
              memory: "256Mi"
              cpu: "500m"
---
apiVersion: v1
kind: Secret
metadata:
  name: bybit-secrets
type: Opaque
data:
  # Base64 encoded keys
  api-key: "REDACTED_BASE64"
  api-secret: "REDACTED_BASE64"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: bot-config
data:
  SYMBOL: "BTC/USDT"
  TARGET_APR: "0.12"
  LEVERAGE: "1.0"
  LOG_LEVEL: "INFO"
