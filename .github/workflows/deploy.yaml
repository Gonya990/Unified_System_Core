name: Cloud Migration & GKE Deploy

on:
    push:
        branches: [main]
        paths:
            - "Projects/AI_Core/**"
            - ".github/workflows/deploy.yaml"
    workflow_dispatch:

env:
    PROJECT_ID: my-home-435112
    GAR_LOCATION: us-central1
    REPOSITORY: unified-core-images
    IMAGE: ai-telegram-bot
    WORKLOAD_IDENTITY_PROVIDER: projects/40369165386/locations/global/workloadIdentityPools/github-pool/providers/github-provider
    SERVICE_ACCOUNT: telegram-bot-firestore@my-home-435112.iam.gserviceaccount.com

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        permissions:
            contents: "read"
            id-token: "write"

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Docker Buildx
              uses: docker/setup-buildx-action@v3

            - name: Google Auth
              id: auth
              uses: google-github-actions/auth@v2
              with:
                  token_format: "access_token"
                  workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
                  service_account: ${{ env.SERVICE_ACCOUNT }}

            - name: Docker Auth
              id: docker-auth
              uses: docker/login-action@v3
              with:
                  registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
                  username: oauth2accesstoken
                  password: ${{ steps.auth.outputs.access_token }}

            - name: Build and Push Container
              uses: docker/build-push-action@v5
              with:
                  context: ./Projects/AI_Core
                  file: ./Projects/AI_Core/Dockerfile
                  push: true
                  tags: |
                      ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}
                      ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:latest
                  cache-from: type=gha
                  cache-to: type=gha,mode=max

            - name: Set up GKE credentials
              uses: google-github-actions/get-gke-credentials@v2
              with:
                  cluster_name: autopilot-cluster-1
                  location: us-central1

            - name: Deploy to GKE
              run: |
                  cd Projects/AI_Core/k8s
                  # Update image tag in kustomization or deployment
                  sed -i "s|image: .*|image: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:${{ github.sha }}|g" deployment-gke.yaml
                  kubectl apply -f namespace.yaml
                  kubectl apply -f deployment-gke.yaml
