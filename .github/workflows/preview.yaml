name: Preview Environment

on:
  pull_request:
    branches: [main]
    paths:
      - "Projects/AI_Core/**"

env:
  PROJECT_ID: my-home-435112
  GAR_LOCATION: us-central1
  REPOSITORY: unified-core-images
  IMAGE: ai-telegram-bot
  WORKLOAD_IDENTITY_PROVIDER: projects/40369165386/locations/global/workloadIdentityPools/github-pool/providers/github-provider
  SERVICE_ACCOUNT: telegram-bot-firestore@my-home-435112.iam.gserviceaccount.com

jobs:
  preview:
    runs-on: ubuntu-latest
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Google Auth
        id: auth
        uses: google-github-actions/auth@v2
        with:
          token_format: "access_token"
          workload_identity_provider: ${{ env.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.SERVICE_ACCOUNT }}

      - name: Docker Auth
        id: docker-auth
        uses: docker/login-action@v3
        with:
          registry: ${{ env.GAR_LOCATION }}-docker.pkg.dev
          username: oauth2accesstoken
          password: ${{ steps.auth.outputs.access_token }}

      - name: Build and Push Preview Image
        id: build-image
        uses: docker/build-push-action@v5
        with:
          context: ./Projects/AI_Core
          file: ./Projects/AI_Core/Dockerfile
          push: true
          tags: ${{ env.GAR_LOCATION }}-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE }}:pr-${{ github.event.number }}

      - name: Set up GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: autopilot-cluster-1
          location: us-central1

      - name: Deploy to Preview Namespace
        run: |
          NAMESPACE="pr-${{ github.event.number }}"
          IMAGE_TAG="pr-${{ github.event.number }}"
          kubectl create namespace "$NAMESPACE" --dry-run=client -o yaml | kubectl apply -f -
          cat Projects/AI_Core/k8s/deployment-gke.yaml \
            | sed "s|namespace: trading|namespace: $NAMESPACE|g" \
            | sed "s|newTag:.*|newTag: $IMAGE_TAG|g" \
            | kubectl apply -f -
          cat Projects/AI_Core/k8s/service.yaml \
            | sed "s|namespace: trading|namespace: $NAMESPACE|g" \
            | kubectl apply -f -

      - name: Comment PR
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: 'Preview environment deployed to namespace `pr-${{ github.event.number }}`'
            })

  cleanup:
    runs-on: ubuntu-latest
    if: github.event.action == 'closed'
    permissions:
      contents: "read"
      id-token: "write"

    steps:
      - name: Set up GKE credentials
        uses: google-github-actions/get-gke-credentials@v2
        with:
          cluster_name: autopilot-cluster-1
          location: us-central1

      - name: Delete Preview Namespace
        run: |
          NAMESPACE="pr-${{ github.event.number }}"
          kubectl delete namespace $NAMESPACE --ignore-not-found=true
