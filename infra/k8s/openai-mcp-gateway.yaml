# OpenAI MCP Gateway - Kubernetes Deployment
# Provides OpenAI API access via MCP protocol

apiVersion: v1
kind: ConfigMap
metadata:
  name: openai-mcp-config
  namespace: unified-system-mcp
data:
  MCP_PORT: "8766"
  LOG_LEVEL: "INFO"

---
apiVersion: v1
kind: Secret
metadata:
  name: openai-mcp-secrets
  namespace: unified-system-mcp
type: Opaque
stringData:
  # Required: OpenAI API Key
  OPENAI_API_KEY: "sk-change-me"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: openai-mcp-gateway
  namespace: unified-system-mcp
  labels:
    app: openai-mcp-gateway
    app.kubernetes.io/name: openai-mcp-gateway
    app.kubernetes.io/component: mcp-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: openai-mcp-gateway
  template:
    metadata:
      labels:
        app: openai-mcp-gateway
    spec:
      containers:
        - name: gateway
          image: ghcr.io/gonya990/unified_system_core/openai-mcp-gateway:latest
          ports:
            - name: mcp
              containerPort: 8766
          envFrom:
            - configMapRef:
                name: openai-mcp-config
            - secretRef:
                name: openai-mcp-secrets
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          livenessProbe:
            httpGet:
              path: /health
              port: mcp
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: mcp
            initialDelaySeconds: 5
            periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: openai-mcp-gateway
  namespace: unified-system-mcp
spec:
  type: ClusterIP
  selector:
    app: openai-mcp-gateway
  ports:
    - name: mcp
      port: 8766
      targetPort: mcp
