# Unified System Observability Stack
# Provides centralized logging, tracing, and metrics collection
#
# Services:
#   - OpenTelemetry Collector: Receives logs, traces, metrics from all services
#   - Loki: Log aggregation and storage
#   - Grafana: Visualization dashboard
#   - Prometheus: Metrics storage (optional, for long-term retention)
#
# Usage:
#   docker compose up -d
#
# Access:
#   - Grafana: http://localhost:3000 (admin/admin)
#   - OTLP Endpoint: http://localhost:4317 (gRPC) or http://localhost:4318 (HTTP)

x-logging: &default-logging
  driver: "json-file"
  options:
    max-size: "10m"
    max-file: "3"

services:
  # ============================================================================
  # OpenTelemetry Collector
  # Receives telemetry from all services and routes to backends
  # ============================================================================
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.92.0
    container_name: otel-collector
    restart: always
    command: ["--config=/etc/otel-collector-config.yaml"]
    volumes:
      - ./otel-collector-config.yaml:/etc/otel-collector-config.yaml:ro
    ports:
      - "4317:4317"   # OTLP gRPC receiver
      - "4318:4318"   # OTLP HTTP receiver
      - "8888:8888"   # Prometheus metrics exposed by the collector
      - "8889:8889"   # Prometheus exporter metrics
      - "13133:13133" # Health check extension
    networks:
      - observability
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:13133/"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # Loki - Log Aggregation
  # Stores and indexes logs from all services
  # ============================================================================
  loki:
    image: grafana/loki:2.9.4
    container_name: loki
    restart: always
    command: -config.file=/etc/loki/local-config.yaml
    volumes:
      - ./loki-config.yaml:/etc/loki/local-config.yaml:ro
      - loki-data:/loki
    ports:
      - "3100:3100"
    networks:
      - observability
    logging: *default-logging
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # Tempo - Distributed Tracing (Optional)
  # Stores and queries traces
  # ============================================================================
  tempo:
    image: grafana/tempo:2.3.1
    container_name: tempo
    restart: always
    command: ["-config.file=/etc/tempo/tempo.yaml"]
    volumes:
      - ./tempo-config.yaml:/etc/tempo/tempo.yaml:ro
      - tempo-data:/tmp/tempo
    ports:
      - "3200:3200"   # Tempo query frontend
      - "9095:9095"   # Tempo compactor
    networks:
      - observability
    logging: *default-logging

  # ============================================================================
  # Prometheus - Metrics Storage
  # Scrapes and stores metrics from all services
  # ============================================================================
  prometheus:
    image: prom/prometheus:v2.49.1
    container_name: prometheus
    restart: always
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-lifecycle"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus
    ports:
      - "9090:9090"
    networks:
      - observability
    logging: *default-logging
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 3

  # ============================================================================
  # Grafana - Visualization
  # Dashboards for logs, traces, and metrics
  # ============================================================================
  grafana:
    image: grafana/grafana:10.3.1
    container_name: grafana
    restart: always
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD:-admin}
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_FEATURE_TOGGLES_ENABLE=traceqlEditor
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    ports:
      - "3000:3000"
    networks:
      - observability
    logging: *default-logging
    depends_on:
      - loki
      - prometheus
      - tempo
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  loki-data:
  tempo-data:
  prometheus-data:
  grafana-data:

networks:
  observability:
    name: observability
    driver: bridge
